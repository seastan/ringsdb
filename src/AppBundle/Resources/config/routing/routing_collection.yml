
collection_packs:
    path: /packs
    methods: [GET]
    defaults:
        _controller: AppBundle:Collection:packs

collection_save_packs:
    path: /packs/save
    methods: [POST]
    defaults:
        _controller: AppBundle:Collection:savePacks

collection_save_art:
    path: /art/save
    methods: [POST]
    defaults:
        _controller: AppBundle:Collection:saveArtPreference
    options:
        expose: true
