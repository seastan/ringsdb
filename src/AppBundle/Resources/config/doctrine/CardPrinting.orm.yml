AppBundle\Entity\CardPrinting:
    type: entity
    table: card_printing
    cache:
        usage: NONSTRICT_READ_WRITE
        region: entity_region
    indexes:
        card_printing_card_idx:
            columns: [ card_id ]
        card_printing_pack_idx:
            columns: [ pack_id ]
    manyToOne:
        card:
            targetEntity: Card
            inversedBy: printings
            joinColumn:
                name: card_id
                referencedColumnName: id
        pack:
            targetEntity: Pack
            inversedBy: printings
            joinColumn:
                name: pack_id
                referencedColumnName: id
    fields:
        id:
            type: integer
            id: true
            generator:
                strategy: AUTO
        position:
            type: smallint
            nullable: false
        quantity:
            type: smallint
            nullable: false
        illustrator:
            type: string
            length: 255
            nullable: true
        octgnid:
            type: string
            nullable: true
        imageCode:
            type: string
            length: 255
            nullable: false
            column: image_code
        traits:
            type: string
            length: 255
            nullable: true
        text:
            type: text
            nullable: true
        cost:
            type: string
            length: 3
            nullable: true
        threat:
            type: smallint
            nullable: true
        willpower:
            type: smallint
            nullable: true
        attack:
            type: smallint
            nullable: true
        defense:
            type: smallint
            nullable: true
        health:
            type: smallint
            nullable: true
        victory:
            type: smallint
            nullable: true
        quest:
            type: smallint
            nullable: true
        dateCreation:
            type: datetime
            nullable: false
            column: date_creation
            gedmo:
                timestampable:
                    on: create
        dateUpdate:
            type: datetime
            nullable: false
            column: date_update
            gedmo:
                timestampable:
                    on: update
